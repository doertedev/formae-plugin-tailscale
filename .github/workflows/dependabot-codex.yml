name: Dependabot Codex Review

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  codex-review:
    name: Codex review
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request merge commit
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false
          fetch-depth: 0

      - name: Fetch pull request refs
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          AUTH_HEADER="$(printf 'x-access-token:%s' "$GH_TOKEN" | base64 -w 0)"
          git -c "http.https://github.com/.extraheader=AUTHORIZATION: basic $AUTH_HEADER" \
            fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/origin/pr/$PR_NUMBER/head"

      - name: Run Codex review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: gpt-5.5
          effort: medium
          sandbox: read-only
          allow-bots: dependabot[bot]
          prompt: |
            Review this Dependabot pull request as a senior Go maintainer.

            Repository: ${{ github.repository }}
            Pull request: #${{ github.event.pull_request.number }}
            Base branch: ${{ github.event.pull_request.base.ref }}
            Head branch: ${{ github.event.pull_request.head.ref }}

            Inspect the dependency changes with git. Prefer:
            - git diff --stat origin/${{ github.event.pull_request.base.ref }}...HEAD
            - git diff origin/${{ github.event.pull_request.base.ref }}...HEAD -- go.mod go.sum
            Do not modify files. Do not run commands that require network or write access.

            Focus on:
            - dependency compatibility risk,
            - security-sensitive transitive changes,
            - generated or unexpected file changes,
            - whether the normal CI signal is enough,
            - whether auto-merge is reasonable.

            Return concise Markdown with exactly these sections:
            - Risk: low, medium, or high
            - Auto-merge: yes or no
            - Required checks
            - Findings

      - name: Comment Codex review
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        with:
          github-token: ${{ github.token }}
          script: |
            const body = process.env.CODEX_FINAL_MESSAGE || "Codex review produced no output.";
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  enable-automerge:
    name: Enable auto-merge for low-risk updates
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@d7267f607e9d3fb96fc2fbe83e0af444713e90b7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check branch protection
        id: protection
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/branches/$BASE_REF/protection" >/dev/null 2>&1; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enable auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' && steps.protection.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"

      - name: Leave patch updates for manual merge without branch protection
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' && steps.protection.outputs.enabled != 'true'
        run: |
          echo "Not enabling auto-merge because branch protection is not enabled for ${{ github.event.pull_request.base.ref }}."

      - name: Leave non-patch updates for manual review
        if: steps.metadata.outputs.update-type != 'version-update:semver-patch'
        run: |
          echo "Not enabling auto-merge for ${{ steps.metadata.outputs.update-type }}."
