name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 12 * * 0'  # Weekly on Sunday at 12:00 UTC
  workflow_dispatch:
    inputs:
      run_conformance:
        description: 'Run conformance tests'
        required: false
        default: 'false'
        type: boolean
      formae_version:
        description: 'Formae version to test against (default: latest)'
        required: false
        default: 'latest'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Pkl
        env:
          PKL_VERSION: 0.31.1
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/$PKL_VERSION/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Build
        run: make build

      - name: Test
        run: make test-unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.3.0
        with:
          version: latest

  pkl-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Pkl
        env:
          PKL_VERSION: 0.31.1
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/$PKL_VERSION/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Validate Pkl schemas
        run: |
          pkl eval formae-plugin.pkl --format json > /dev/null
          echo "Manifest validated successfully"

  verify-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Pkl
        env:
          PKL_VERSION: 0.31.1
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/$PKL_VERSION/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Verify schema
        run: make verify-schema

  # --------------------------------------------------------------------------
  # Live API tests (integration + conformance)
  #
  # Decision (see docs/testing.md): live tests mutate a real Tailscale tailnet,
  # so they run WEEKLY (schedule) and via MANUAL workflow_dispatch only. They
  # are never triggered automatically on push/PR. Every live job is gated on
  # TAILSCALE_API_KEY being configured so forks and branches without secrets
  # SKIP cleanly instead of failing red.
  # --------------------------------------------------------------------------

  # Integration tests run against the real Tailscale API.
  integration-tests:
    needs: [build, lint]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_conformance == 'true' }}
    steps:
      - name: Check Tailscale credentials
        id: credentials
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
        run: |
          if [ -n "$TAILSCALE_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping integration tests because TAILSCALE_API_KEY is not configured."
          fi

      - name: Checkout
        if: steps.credentials.outputs.available == 'true'
        uses: actions/checkout@v7

      - name: Set up Go
        if: steps.credentials.outputs.available == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Pkl
        if: steps.credentials.outputs.available == 'true'
        env:
          PKL_VERSION: 0.31.1
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/$PKL_VERSION/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Run integration tests
        if: steps.credentials.outputs.available == 'true'
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          TAILSCALE_OAUTH_SCOPES: ${{ secrets.TAILSCALE_OAUTH_SCOPES }}
          TAILSCALE_TAILNET: ${{ secrets.TAILSCALE_TAILNET }}
        run: make test-integration

  # Conformance tests run against the real Tailscale API through formae.
  conformance-tests:
    needs: [build, lint, pkl-validate, verify-schema]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || github.event.inputs.run_conformance == 'true' }}
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        # Test against these formae versions. Expand as needed:
        # formae_version: ['0.78.0', '0.79.0', 'latest']
        formae_version: ['latest']

    # Uncomment and configure for your cloud provider:
    # permissions:
    #   id-token: write  # Required for OIDC
    #   contents: read

    steps:
      - name: Check Tailscale credentials
        id: credentials
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
        run: |
          if [ -n "$TAILSCALE_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "Skipping conformance tests because TAILSCALE_API_KEY is not configured."
          fi

      - name: Checkout
        if: steps.credentials.outputs.available == 'true'
        uses: actions/checkout@v7

      - name: Set up Go
        if: steps.credentials.outputs.available == 'true'
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Install Pkl
        if: steps.credentials.outputs.available == 'true'
        env:
          PKL_VERSION: 0.31.1
        run: |
          curl -fsSL -o pkl "https://github.com/apple/pkl/releases/download/$PKL_VERSION/pkl-linux-amd64"
          chmod +x pkl
          sudo mv pkl /usr/local/bin/pkl
          pkl --version

      - name: Install plugin
        if: steps.credentials.outputs.available == 'true'
        run: make install

      - name: Run conformance tests
        if: steps.credentials.outputs.available == 'true'
        env:
          TAILSCALE_API_KEY: ${{ secrets.TAILSCALE_API_KEY }}
          TAILSCALE_OAUTH_CLIENT_ID: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          TAILSCALE_OAUTH_CLIENT_SECRET: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          TAILSCALE_OAUTH_SCOPES: ${{ secrets.TAILSCALE_OAUTH_SCOPES }}
          TAILSCALE_TAILNET: ${{ secrets.TAILSCALE_TAILNET }}
          FORMAE_TEST_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          # Use input version if provided, otherwise use matrix version
          VERSION="${{ inputs.formae_version }}"
          if [ "$VERSION" = "" ] || [ "$VERSION" = "latest" ]; then
            VERSION="${{ matrix.formae_version }}"
          fi
          make conformance-test VERSION="$VERSION"
